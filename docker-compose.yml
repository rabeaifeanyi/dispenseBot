services:
  postgres:
    image: postgres:15-alpine
    container_name: kommissionierautomat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kommissionierautomat
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/rabeaifeanyi/dispensebot:latest
    container_name: kommissionierautomat-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      MC_API_URL: ${MC_API_URL:-http://192.168.178.1}
    network_mode: host

volumes:
  postgres_data:
